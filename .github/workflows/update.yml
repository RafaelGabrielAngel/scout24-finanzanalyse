name: Update Scout24 Data

on:
  schedule:
    # Täglich um 07:15 UTC (08:15 MEZ / 09:15 MESZ) — nach Marktöffnung
    - cron: "15 7 * * 1-5"
  workflow_dispatch:     # Manuell auslösbar via GitHub UI

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 24 (ab Juni 2026 Pflicht)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Fetcher
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python fetcher.py

      - name: Commit data.json (wenn geändert)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "data: auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
